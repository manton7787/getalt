 - code: alt-mobile
   branch: p11
   name_en: ALT Mobile
   name_ru: Альт Мобильный
   img: alt-mobile
   bgcolor: #a00...

   descr_ru: |
     Операционная система для мобильных устройств, смартфонов и планшетов.

   descr_en: |
     Operating system for mobile devices, smartphones, and tablets.

   descr_full_ru: |
    <a href="https://www.altlinux.org/ALT_Mobile"><b>Альт Мобильный 11</b></a> — операционная система для планшетов, смартфонов и других мобильных 
    устройств с сенсорным управлением (считывателей, встроенных систем, кассовой техники и терминалов сбора данных).
    <p>
    Разработка операционной системы ведётся в соответствии с принципами свободного программного обеспечения. 
    Кодовая база полностью открыта и опубликована. «Альт Мобильный» не зависит от Android или AOSP и не использует их компонентов.

    <p>Особенности ОС «Альт Мобильный»:

    <ul>
    <li>Интерфейс ОС «Альт Мобильный» адаптирован для экранов мобильных устройств с сенсорным 
    управлением и использует оболочку Phosh, основанную на технологиях GNOME.</li>
    <li>Система включает программы для выполнения стандартных задач на смартфонах и планшетах: 
    звонки, отправка SMS/MMS, работа в браузерах, мессенджерах и с электронной почтой, управление 
    камерой, работа с мультимедийным контентом, прослушивание музыки, навигация, чтение электронных книг.</li>
    <li>«Центр приложений» предоставляет возможность установки программ через удобный графический интерфейс. 
    Для продвинутых пользователей есть консоль и штатные средства APT.</li>
    </ul>

    <p>... и не только.</p>
    <p>Создание образа корневой файловой системы из aarch64-архива  описано <a href="https://altmobile.org/">в базе знаний «Альт Мобильный»</a>.</p>

   descr_full_en: |
    <a href="https://www.altlinux.org/ALT_Mobile"><b>ALT Mobile 11</b></a>
    <p> is an operating system for tablets, smartphones, and other mobile devices with touch controls, such as readers, 
    embedded systems, cash registers, and data collection terminals.<p>
    The operating system is developed in accordance with the principles of free software. 
    The code base is fully open and published. ALT Mobile is independent of Android or AOSP and does not use their components.</p>

    <p>Features of the ALT Mobile OS:</p>

    <ul>
    <li>The ALT Mobile OS interface is adapted for touch-sensitive mobile device screens and uses the Phosh shell, which is based on GNOME technologies</li>
    <li>The system includes programs for performing standard tasks on smartphones and tablets, such as making calls, sending SMS/MMS, using browsers, messaging apps, and email, managing the camera, working with multimedia content, listening to music, navigating, and reading e-books</li>
    <li>The App Center provides a user-friendly graphical interface for installing programs. For advanced users, there is a console and standard apt tools</li>
    </ul>

    <p>... and not only that.</p>

    <a>Creating an image of the root file system from the aarch64 archive is described <a href="https://altmobile.org/en/">in the ALT Mobile knowledge base</a>.</p>

 - name_ru: Другие
   name_en: Other
   code: starterkits
   img: starterkits
   branch: p10

   descr_ru: |
     Стартовые наборы представляют из себя свободно распространяемые
     сборки на основе стабильного репозитория Альт, предназначенные
     для опытных пользователей и разработчиков производных решений.

   descr_en: |
     Starter kits are freely distributable images based on the stable
     ALT repository and designed for experienced users and developers
     of derivative solutions.

   descr_full_ru: |
     <a href="http://altlinux.org/starterkits"><b>Стартовые наборы</b></a>
     Одиннадцатой платформы — ежеквартальные сборки для опытных пользователей.
     Они не являются полноценными дистрибутивами (например, не содержат
     документации к выпуску и не подлежат технической поддержке), но
     позволяют&colon;
     <ul>
     <li>
     быстро и удобно посмотреть графические окружения, не входящие
     в официальные релизы, но имещиеся в репозитории;
     </li>
     <li>
     развернуть очередную систему с минимальным расходом времени на
     установку и настройку;
     </li>
     <li>
     произвести работы по восстановлению данных или функционирования
     пострадавшей от аппаратных сбоев или программных разрушений системы,
     а также произвести расследование инцидентов безопасности;
     </li>
     <li>
     создать производный образ системы, наиболее адаптированный для
     конкретных условий эксплуатации.
     </li>
     </ul>
     <p>
     Каждый стартовый набор как составное произведение предоставляется под
     <a href="http://nightly.altlinux.org/p10/license.ru.html">свободной лицензией GPL</a>,
     то есть получатель имеет свободу&colon;
     </p>
     <ul>
     <li>применять стартовый набор в любых целях;</li>
     <li>дорабатывать его под свои нужды;</li>
     <li>обмениваться полученным с другими;</li>
     <li>обмениваться сделанными изменениями.</li>
     </ul>

     <p>
     Предлагаем перейти к&colon;</p>
     <ul>
     <li><a href="http://altlinux.org/Starterkits/About">описанию проекта</a>;
     <li><a href="http://altlinux.org/Starterkits/Flavours">доступным вариантам</a>
       и <a href="http://altlinux.org/Starterkits/Memory">требованиям к ресурсам</a>;
     <li><a href="http://altlinux.org/Starterkits/Download">ссылкам на загрузку</a>.
     </ul>

     <p>
     <a href="http://altlinux.org/m-p">Сборочный профиль</a>
     содержится в ISO-образах как <tt>.disk/profile.tgz</tt>.
     </p>

   descr_full_en: |
     <p>
     Platform 11 <a href="http://en.altlinux.org/starterkits"><b>Starter kits</b></a>
     are quarterly builds for experienced users. They are
     not full-fledged distributions (for example, there is no release
     documentation and no technical support) but allow to&colon;</p>
     <ul>
     <li>
     take a look at graphical desktop environments which are not part
     of the official releases but rather available in repository;
     </li>
     <li>
     deploy another operating system instance with minimum expenses on
     installation and final adjustments;
     </li>
     <li>
     recover data or rescue a system damaged by hardware fault
     or software disaster as well as perform forensic analysis;
     </li>
     <li>
     create derivative operating system image adapted for specific application.
     </li>
     </ul>

     <p>
     Each starter kit itself is
     <a href="http://nightly.altlinux.org/p10/license.all.html">free software licensed under GPL</a>
     as a composite work, so that recipient has the freedom to&colon;</p>

     <ul>
     <li>use the starterkit for any purpose,</li>
     <li>change it to suit one's needs,</li>
     <li>share the download with others,</li>
     <li>share the changes one makes.</li>
     </ul>

     <p>
     Please see <a href="http://en.altlinux.org/starterkits">the wiki page</a>
     for project description, flavours provided, and the actual
     <a href="http://en.altlinux.org/starterkits#download">download links</a>.
     </p>

     <p>
     The build profile is contained in ISO images as <tt>.disk/profile.tgz</tt>.
     </p>
